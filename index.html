<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>📸 Image Gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a; color: #f1f5f9;
    min-height: 100vh; padding: 32px 20px;
  }
  h1 { text-align: center; font-size: 2rem; margin-bottom: 24px; }

  .upload-card {
    max-width: 640px; margin: 0 auto 24px;
    padding: 16px; border-radius: 16px;
    background: #1e293b; border: 1px solid #334155;
  }
  .upload-row {
    display: flex; flex-wrap: wrap; gap: 12px;
    justify-content: center; align-items: center;
  }
  select, .btn {
    padding: 8px 16px; border-radius: 8px;
    background: #334155; color: #f1f5f9;
    border: 1px solid #475569; font-size: 14px; cursor: pointer;
  }
  .btn-primary {
    background: #3b82f6; border-color: #3b82f6;
    border-radius: 999px; padding: 10px 20px; font-weight: 500;
  }
  .btn-primary:hover { background: #2563eb; }
  .hint { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 8px; }
  .error { text-align: center; font-size: 13px; color: #f87171; margin-top: 8px; }

  .filters {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 8px; margin-bottom: 32px;
  }
  .filter-btn {
    padding: 8px 20px; border-radius: 999px;
    background: #334155; color: #f1f5f9;
    border: none; cursor: pointer; font-size: 14px;
    transition: background 0.2s;
  }
  .filter-btn.active { background: #3b82f6; }
  .filter-btn:hover:not(.active) { background: #475569; }

  .grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  }
  .card { position: relative; overflow: hidden; border-radius: 16px; }
  .card img {
    width: 100%; height: 256px; object-fit: cover;
    cursor: pointer; transition: transform 0.5s, filter 0.5s;
    display: block;
  }
  .card:hover img { transform: scale(1.1); filter: brightness(1.1); }
  .remove-btn {
    position: absolute; top: 8px; right: 8px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: white; border: none;
    cursor: pointer; opacity: 0; transition: opacity 0.2s;
    font-size: 14px;
  }
  .card:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { background: #ef4444; }

  .lightbox {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.9);
    display: none; flex-direction: column;
    align-items: center; justify-content: center; padding: 16px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90%; max-height: 70vh; border-radius: 12px; }
  .lightbox .close {
    position: absolute; top: 20px; right: 24px;
    background: none; border: none; color: white;
    font-size: 28px; cursor: pointer;
  }
  .lightbox-nav { margin-top: 20px; display: flex; gap: 12px; }
</style>
</head>
<body>
  <h1>📸 Image Gallery</h1>

  <div class="upload-card">
    <div class="upload-row">
      <label>Category:</label>
      <select id="uploadCategory">
        <option value="nature">Nature</option>
        <option value="city">City</option>
        <option value="animals">Animals</option>
      </select>
      <input type="file" id="fileInput" accept="image/*" multiple hidden />
      <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
        + Upload photos
      </button>
    </div>
    <p id="error" class="error" style="display:none"></p>
    <p class="hint">Stored locally in your browser • Max 4MB per image</p>
  </div>

  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="close" onclick="closeLightbox()">✖</button>
    <img id="lightboxImg" onclick="event.stopPropagation()" />
    <div class="lightbox-nav" onclick="event.stopPropagation()">
      <button class="btn btn-primary" onclick="navLightbox(-1)">⏮ Prev</button>
      <button class="btn btn-primary" onclick="navLightbox(1)">Next ⏭</button>
    </div>
  </div>

<script>
  const STORAGE_KEY = "gallery_uploads_v1";
  const MAX_FILE_BYTES = 4 * 1024 * 1024;
  const FILTERS = ["all", "nature", "city", "animals"];

  // Replace with your own image URLs
  const defaultPhotos = [
    { id:"d1", src:"https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600", category:"nature" },
    { id:"d2", src:"https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600", category:"city" },
    { id:"d3", src:"https://images.unsplash.com/photo-1574144611937-0df059b5ef3e?w=600", category:"animals" },
    { id:"d4", src:"https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600", category:"nature" },
    { id:"d5", src:"https://images.unsplash.com/photo-1496588152823-86ff7695e68f?w=600", category:"city" },
    { id:"d6", src:"https://images.unsplash.com/photo-1425082661705-1834bfd09dca?w=600", category:"animals" },
  ];

  let uploads = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let currentFilter = "all";
  let lightboxIndex = null;
  let visible = [];

  function showError(msg) {
    const el = document.getElementById("error");
    el.textContent = msg; el.style.display = msg ? "block" : "none";
  }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(uploads)); }
    catch { showError("Storage is full. Remove some uploads."); }
  }

  function renderFilters() {
    document.getElementById("filters").innerHTML = FILTERS.map(f =>
      `<button class="filter-btn ${f===currentFilter?'active':''}" onclick="setFilter('${f}')">${f[0].toUpperCase()+f.slice(1)}</button>`
    ).join("");
  }

  function setFilter(f) { currentFilter = f; render(); }

  function render() {
    renderFilters();
    const all = [...uploads, ...defaultPhotos];
    visible = currentFilter === "all" ? all : all.filter(p => p.category === currentFilter);
    document.getElementById("grid").innerHTML = visible.map((p, i) => `
      <div class="card">
        <img src="${p.src}" alt="${p.category}" loading="lazy" onclick="openLightbox(${i})" />
        ${p.uploaded ? `<button class="remove-btn" onclick="removeUpload('${p.id}')">✕</button>` : ""}
      </div>
    `).join("");
  }

  function removeUpload(id) {
    uploads = uploads.filter(p => p.id !== id);
    persist(); render();
  }

  document.getElementById("fileInput").addEventListener("change", async (e) => {
    showError("");
    const files = Array.from(e.target.files || []);
    const cat = document.getElementById("uploadCategory").value;
    const accepted = [];
    for (const file of files) {
      if (!file.type.startsWith("image/")) { showError("Only images allowed."); continue; }
      if (file.size > MAX_FILE_BYTES) { showError(`"${file.name}" >4MB skipped.`); continue; }
      const dataUrl = await new Promise(res => {
        const r = new FileReader();
        r.onload = () => res(r.result); r.readAsDataURL(file);
      });
      accepted.push({ id:"u_"+Date.now()+"_"+Math.random().toString(36).slice(2,8), src:dataUrl, category:cat, uploaded:true });
    }
    if (accepted.length) { uploads = [...accepted, ...uploads]; persist(); render(); }
    e.target.value = "";
  });

  function openLightbox(i) {
    lightboxIndex = i;
    document.getElementById("lightboxImg").src = visible[i].src;
    document.getElementById("lightbox").classList.add("open");
  }
  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    lightboxIndex = null;
  }
  function navLightbox(dir) {
    if (lightboxIndex === null) return;
    lightboxIndex = (lightboxIndex + dir + visible.length) % visible.length;
    document.getElementById("lightboxImg").src = visible[lightboxIndex].src;
  }

  document.addEventListener("keydown", (e) => {
    if (!document.getElementById("lightbox").classList.contains("open")) return;
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") navLightbox(1);
    if (e.key === "ArrowLeft") navLightbox(-1);
  });

  render();
</script>
</body>
</html>
